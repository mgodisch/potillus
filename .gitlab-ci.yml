#
# GitLab CI pipeline (https://docs.gitlab.com/ci/). Successor to the Woodpecker
# pipeline the project ran while hosted on Codeberg; same scope, same checks,
# translated to GitLab's syntax.
#
# SCOPE — deliberately narrow:
#   * CHECKS ONLY, never a build. The device-free `tools/` checks reproduce on
#     plain Linux what a Mac or the Android SDK would otherwise be needed for
#     (Swift symbol/length/test linting as Python, l10n parity, store-metadata
#     limits, license headers, backup-format invariants, ...). A real Android
#     build (`lintDebug`, instrumented tests) needs the SDK and an emulator; an
#     iOS build needs macOS + Xcode and cannot run on a Linux runner at all.
#     Both stay local / pre-release, exactly as docs/ROADMAP.md records.
#   * MERGE REQUESTS TARGETING main ONLY, enforced by the `workflow:` block
#     below. The gate runs at the one moment that matters — code asking to enter
#     main — and not on every commit. `main` itself is a protected branch that
#     no one may push to directly, so there is no second path into it that would
#     need its own trigger.
#
# The three jobs below are the same read-only gates that pass in the project's
# own QA log (`tools/release-check.sh`, `make check-static`, and the SCA scan);
# they only read and judge, write nothing, and need no secrets — which is what
# lets this pipeline satisfy the least-privilege OSPS controls recorded in
# docs/ROADMAP.md.
#
# THIS FILE IS ONLY HALF THE GATE. A pipeline that runs but does not BLOCK is
# advisory, and OSPS-QA-03.01 asks for enforcement. The other half is a project
# setting that cannot live in the repository:
#
#     Settings > Merge requests > "Pipelines must succeed"
#
# Without that checkbox a red pipeline still permits a merge.

# Workflow-global gate: if no rule matches, no pipeline is created at all —
# nothing is cloned and no runner time is spent. This is the direct equivalent
# of the retired pipeline's workflow-level `when:` clause.
#
# CI_MERGE_REQUEST_TARGET_BRANCH_NAME is only defined for merge_request_event
# pipelines, so the first condition is what makes the second meaningful; an
# ordinary push to any branch matches nothing and triggers nothing.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'

# One small, predictable base image for every job. The official `python:3-slim`
# image (Debian slim underneath) ships the Python 3 interpreter the checks run
# on — every tool imports only the standard library plus the repo's own
# `potillus_repo`, so no pip step is ever needed. `make`, `git` and `file` are
# the only additions. `git` matters for more than the clone: the checks discover
# tracked files via `git ls-files`, and release-check reads the changelog/tag
# state through git. The tag is intentionally unpinned (`3`, not `3.13`): the
# checks are stdlib-only and version-agnostic, so tracking the current Python 3
# keeps the runner cache-friendly without a pin to maintain.
#
# The `before_script` runs ahead of every job's `script`, so the three jobs below
# state only what actually distinguishes them.
default:
  image: python:3-slim
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends make git file
    # The runner clones as a different uid than the one that later runs the
    # commands; git refuses to operate on a "dubious ownership" tree until the
    # checkout is marked safe. `$PWD` is the cloned workspace (every job's
    # default working directory) — shell-native, so it needs no CI variable.
    # Harmless and standard for CI containers.
    - git config --global --add safe.directory "$PWD"

# A single stage: the three checks are independent and none consumes another's
# output, so they run in parallel and a merge request gets all three verdicts at
# once rather than stopping at the first failure.
stages:
  - check

# The repository-wide release gate, in its strict mode: --Werror turns every
# warning into an error, so a merge request cannot introduce a finding that a
# release would later have to clear.
release-check:
  stage: check
  script:
    - bash tools/release-check.sh --Werror

# The device-free static battery: check-ios-static (Swift symbol/length/test
# linting reproduced in Python, so the Swift side is covered without a Mac),
# UI-string parity, the bestpractices level map, and the VEX document.
static-checks:
  stage: check
  script:
    - make check-static

# Software Composition Analysis on every merge request to main. This scans the
# lockfiles committed in the tree (fastlane/Gemfile.lock and
# ios/PotillusKit/Package.resolved) with osv-scanner's source scan — no SDK, no
# build, so it stays light. It is the per-change counterpart to the
# release-staging SCA gate, which additionally scans the FULL transitive SBOM
# each build produces (the Android app graph a source scan cannot see without
# Gradle); see make/release.mk and SECURITY.md. A finding fails this job, and
# with "Pipelines must succeed" enabled a vulnerable dependency blocks the merge.
dependency-scan:
  stage: check
  before_script:
    # Replaces the default before_script: this job needs no make/git/file, but
    # does need TLS roots and a downloader.
    - apt-get update -qq
    - apt-get install -y --no-install-recommends ca-certificates wget
  variables:
    # Pinned to a specific release rather than `latest`, so the scanner version
    # that gates a merge is reproducible and does not drift under us (the same
    # discipline the pinned tool versions elsewhere follow), and matches the
    # version the maintainer runs locally for the staging SBOM scan.
    OSV_SCANNER_VERSION: "2.4.0"
    # sha256 of the official prebuilt linux/amd64 binary for that version.
    # A version tag alone is NOT a pin: a release asset can be replaced upstream
    # without the tag changing, and this job decides whether a merge may proceed,
    # so it must not run whatever the URL happens to serve today. Re-derive with
    #   curl -fsSL <the URL below> | sha256sum
    # when bumping OSV_SCANNER_VERSION, and cross-check against the checksums
    # upstream publishes for the release before committing the new value.
    OSV_SCANNER_SHA256: "15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0"
  script:
    - wget -qO /tmp/osv-scanner "https://github.com/google/osv-scanner/releases/download/v$OSV_SCANNER_VERSION/osv-scanner_linux_amd64"
    # Verify BEFORE making it executable, so a mismatched binary is never in a
    # state where a later line could accidentally run it.
    - echo "$OSV_SCANNER_SHA256  /tmp/osv-scanner" | sha256sum -c -
    - install -m 0755 /tmp/osv-scanner /usr/local/bin/osv-scanner
    # `scan source -r .` finds the lockfiles itself and honours osv-scanner.toml
    # (the triage allowlist). Exit 1 on a finding fails the job by design.
    - osv-scanner scan source -r --config=osv-scanner.toml .
