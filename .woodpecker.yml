#
# Woodpecker CI pipeline for Codeberg (https://woodpecker-ci.org).
#
# SCOPE — deliberately narrow, to be a good guest on Codeberg's shared runners:
#   * CHECKS ONLY, never a build. The device-free `tools/` checks reproduce on
#     plain Linux what a Mac or the Android SDK would otherwise be needed for
#     (Swift symbol/length/test linting as Python, l10n parity, store-metadata
#     limits, license headers, backup-format invariants, ...). A real Android
#     build (`lintDebug`, instrumented tests) needs the SDK and an emulator; an
#     iOS build needs macOS + Xcode and cannot run on a Linux runner at all.
#     Both stay local / pre-release, exactly as docs/ROADMAP.md now records.
#   * PULL REQUESTS TARGETING main ONLY. `event: pull_request` already means an
#     ordinary push to any branch triggers NOTHING; the added `branch: main`
#     narrows it to PRs whose TARGET is main (for a pull_request event the
#     branch filter matches the destination, per the Woodpecker docs). So the
#     gate runs at the one moment that matters — code asking to enter main —
#     and not on every commit.
#
# The two commands below are the same read-only gates that pass in the project's
# own QA log (`make check-static` and `tools/release-check.sh`); they only read
# and judge, write nothing, and need no secrets — which is what lets this
# pipeline satisfy the least-privilege OSPS controls noted in docs/ROADMAP.md
# once it has been observed green on Codeberg.

# Workflow-global gate: if this `when` is not met, the whole workflow is not
# even added to the pipeline — nothing is cloned, no runner time is spent.
when:
  - event: pull_request
    branch: main

# One small, predictable base image for both steps. The official `python:3-slim`
# image (Debian slim underneath) ships the Python 3 interpreter the checks run
# on — every tool imports only the standard library plus the repo's own
# `potillus_repo`, so no pip step is ever needed. `make`, `git` and `file` are
# the only additions. `git` matters for more than the clone: the checks discover
# tracked files via `git ls-files`, and release-check reads the changelog/tag
# state through git. The tag is intentionally unpinned (`3`, not `3.13`): the
# checks are stdlib-only and version-agnostic, so tracking the current Python 3
# keeps the runner cache-friendly without a pin to maintain.
variables:
  - &base_image 'python:3-slim'

steps:
  - name: release-check
    image: *base_image
    commands:
      - apt-get update -qq
      - apt-get install -y --no-install-recommends make git file
      # Codeberg clones as a different uid than the one that later runs the
      # commands; git refuses to operate on a "dubious ownership" tree until the
      # checkout is marked safe. `$PWD` is the cloned workspace (the default
      # working directory of every step) — shell-native, so it needs no CI
      # variable. Harmless and standard for CI containers.
      - git config --global --add safe.directory "$PWD"
      - bash tools/release-check.sh --Werror

  - name: static-checks
    image: *base_image
    commands:
      - apt-get update -qq
      - apt-get install -y --no-install-recommends make git file
      - git config --global --add safe.directory "$PWD"
      - make check-static

  - name: dependency-scan
    image: *base_image
    commands:
      # Software Composition Analysis on every pull request to main. This scans
      # the lockfiles committed in the tree (fastlane/Gemfile.lock and
      # ios/PotillusKit/Package.resolved) with osv-scanner's source scan — no
      # SDK, no build, so it stays a light guest on Codeberg's shared runners.
      # It is the per-change counterpart to the release-staging SCA gate, which
      # additionally scans the FULL transitive SBOM each build produces (the
      # Android app graph a source scan cannot see without Gradle); see
      # make/release.mk and SECURITY.md. A finding fails this step, and branch
      # protection on main requires the step to pass, so a vulnerable dependency
      # blocks the merge.
      - apt-get update -qq
      - apt-get install -y --no-install-recommends ca-certificates wget
      # Pinned to a specific release rather than `latest`, so the scanner version
      # that gates a merge is reproducible and does not drift under us (the same
      # discipline the pinned tool versions elsewhere follow), and matches the
      # version the maintainer runs locally for the staging SBOM scan. The
      # official, prebuilt Linux binary from the upstream release page.
      - wget -qO /usr/local/bin/osv-scanner https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64
      - chmod +x /usr/local/bin/osv-scanner
      # `scan source -r .` finds the lockfiles itself and honours osv-scanner.toml
      # (the triage allowlist). Exit 1 on a finding fails the step by design.
      - osv-scanner scan source -r --config=osv-scanner.toml .
