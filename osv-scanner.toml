#
# osv-scanner configuration (https://google.github.io/osv-scanner/configuration/).
#
# The release SCA gate (`osv-scan-sbom` in make/release.mk) runs osv-scanner
# against each platform's CycloneDX SBOM during staging and fails the release on
# any reported vulnerability. This file is the machine-readable form of the
# triage policy documented in SECURITY.md ("Dependency monitoring"): a finding
# that has been assessed and found NON-EXPLOITABLE in this app may be recorded
# here so it no longer blocks a release, while a finding that is not listed here
# still stops the release.
#
# The list starts EMPTY: no advisory is ignored by default, so every finding
# blocks a release until it is either fixed (by upgrading the dependency) or
# consciously recorded below with a reason. Each entry is auditable in the diff
# that adds it.
#
# To ignore an assessed-harmless advisory, add a block like:
#
#   [[IgnoredVulns]]
#   id = "GHSA-xxxx-xxxx-xxxx"   # or the OSV / CVE id
#   # ignoreUntil = 2026-12-31   # optional: auto-expire the exception
#   reason = "Why this advisory does not affect Libellus Potionis — e.g. the
#             vulnerable code path is never reached because the app performs no
#             network I/O. Mirror the assessment kept in SECURITY.md."
#
# When you add an ignore here, add a matching `not_affected` statement to
# openvex.json (the machine-readable VEX record for OSPS-VM-04.02); the
# tools/check-vex.py gate (part of `make check-static`) FAILS if an ignore here
# has no matching VEX statement, so the two cannot drift.
#
# No advisories are currently ignored.
