name: Potillus

options:
  bundleIdPrefix: de.godisch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

packages:
  # PotillusKit depends on GRDB (SwiftPM resolves it transitively), so the app
  # target needs no direct GRDB entry here.
  PotillusKit:
    path: PotillusKit

targets:
  Potillus:
    type: application
    platform: iOS
    sources:
      - path: Potillus
    dependencies:
      - package: PotillusKit
        product: PotillusKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.godisch.potillus
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Libellus Potionis"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"

  PotillusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PotillusTests
    dependencies:
      - target: Potillus
      - package: PotillusKit
        product: PotillusKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.godisch.potillus.tests
        GENERATE_INFOPLIST_FILE: "YES"

# An explicit scheme is needed so the test action knows about the test target;
# without it, `Cmd+U` and `xcodebuild test` fail with "not configured for the
# test action".
schemes:
  Potillus:
    build:
      targets:
        Potillus: all
        PotillusTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PotillusTests
