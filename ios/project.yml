name: Potillus

options:
  bundleIdPrefix: de.godisch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  knownRegions:
    - en
    - da
    - de
    - es
    - fr
    - it
    - nl
    - nb
    - pl
    - pt
    - pt-BR
    - ro
    - sv
    - cs
    - el
    - ru
    - uk
    - zh-Hans
    - zh-Hant
    - ja
    - ko

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Do NOT let the build extract Swift strings back into the String Catalog.
    # With this at Xcode's default (YES), every build that finds something to
    # update rewrites ios/Potillus/Localizable.xcstrings — re-extracting the
    # direct `String(localized: "…")` literals (the plurals in Localization.swift)
    # and, because Xcode writes `"key" : value` while the committed file is stored
    # as `"key": value`, reformatting every line. The result is a spurious working-
    # tree change in a single file that blocks `git pull` intermittently ("commit
    # your changes or stash them"). The catalog is this project's committed source
    # of truth (entries are `extractionState: manual`; check-l10n-parity.py is the
    # gate that a literal has a key, not Xcode's extractor), so the build has no
    # business owning it. Turning extraction off does not affect the runtime: the
    # catalog is still COMPILED into the bundle, and String(localized:) reads it —
    # only the write-back is suppressed. Nothing in Makefile or tools/ relies on
    # extraction. After changing this, re-run `make ios-project` (xcodegen) so the
    # setting reaches the generated project.
    SWIFT_EMIT_LOC_STRINGS: "NO"
    # MARKETING_VERSION and CURRENT_PROJECT_VERSION deliberately do NOT live
    # here: a value in `settings` overrides an xcconfig, which would silently
    # defeat the generator. They come from Version.xcconfig (see configFiles
    # below), derived from CHANGELOG.md and the Android versionCode by
    # `make ios-version`.
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

# Version.xcconfig is GENERATED (and git-ignored) by tools/gen-ios-version.py.
# Run `make ios-version` before `xcodegen generate`, or the project will not
# resolve. This is the single-source-of-truth rule from CONTRIBUTING.md section 7
# extended to the iOS build.
configFiles:
  Debug: Version.xcconfig
  Release: Version.xcconfig

packages:
  # PotillusKit depends on GRDB (SwiftPM resolves it transitively), so the app
  # target needs no direct GRDB entry here.
  PotillusKit:
    path: PotillusKit

targets:
  Potillus:
    type: application
    platform: iOS
    # The app icon lives in Assets.xcassets/AppIcon.appiconset (one 1024x1024
    # marketing icon; Xcode's actool derives the smaller sizes). Naming that set
    # here makes actool treat it as THE app icon: it writes the CFBundleIconName
    # Info.plist key and emits the icon into the bundle. Without it, App Store
    # upload validation rejects the build ("Missing CFBundleIconName" / no 120x120
    # icon). The catalog needs no `sources` entry -- it sits under the Potillus/
    # source path below and is picked up automatically.
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: Potillus
      # The PDF template lives at the repository root because BOTH platforms read
      # it: Android registers report/ as an asset directory, and this line copies
      # the same file into the iOS bundle. One file, two reports, no drift.
      #
      # `buildPhase` must be stated: XcodeGen guesses from the extension, and an
      # .html would not be guessed into the Copy Bundle Resources phase. `type: file`
      # keeps it a file reference instead of a group.
      - path: ../report/report_template.html
        type: file
        buildPhase: resources
      # The verbatim GPLv3 text the About screen links to, generated by the
      # Makefile before this project is regenerated (see
      # ios/Potillus/Resources/license_gpl3.md). It is the only license this app
      # must bundle: its one third-party dependency is GRDB, whose MIT text is
      # short enough to sit inline in the About screen. Same type: file /
      # buildPhase reasoning as the template above.
      - path: Potillus/Resources/license_gpl3.md
        type: file
        buildPhase: resources
      # The localized in-app user guides, generated by `make ios-guides` before
      # this project is regenerated. One usersguide_<tag>.md per language; the app
      # loads the file for its in-app language with an English fallback. Same
      # type: file / buildPhase reasoning as the documents above. For now only the
      # English guide is the fallback; each language loads its own when present.
      - path: Potillus/Resources/usersguide_en.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_de.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_da.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_nl.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_nb.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_sv.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_es.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_fr.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_it.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_pt.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_pt-BR.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_ro.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_cs.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_pl.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_ru.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_uk.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_el.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_ja.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_ko.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_zh-Hans.md
        type: file
        buildPhase: resources
      - path: Potillus/Resources/usersguide_zh-Hant.md
        type: file
        buildPhase: resources
    dependencies:
      - package: PotillusKit
        product: PotillusKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.godisch.potillus
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Libellus Potionis"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        # Required by the system before it will show a Face ID prompt. Without it
        # `evaluatePolicy` fails outright. The passcode fallback needs no key; this
        # one string is the whole Info.plist cost of the app lock. Shown to the user
        # in the Face ID permission dialog the first time the lock is armed.
        #
        # This value here is the ENGLISH FALLBACK only. The dialog is a system
        # surface and follows the SYSTEM language, so the sentence is localized —
        # like every other user-visible string — via Potillus/InfoPlist.xcstrings,
        # the String Catalog Xcode consults for generated-Info.plist keys (0.83.0
        # QA round: without it, all twenty non-English languages saw English here).
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Unlock Libellus Potionis with Face ID."
        # Export-compliance declaration. The app is fully offline and uses only the
        # encryption built into the operating system — the Keychain (Security
        # framework) for the app-lock secret, and SQLite for the database. It ships
        # no proprietary cryptography and makes no network calls, so it uses no
        # NON-exempt encryption; the honest, binding answer is "NO". Setting it here
        # answers App Store Connect's prompt once for every build and unblocks a
        # TestFlight build from "Missing Compliance". A regulatory declaration, not a
        # UI shortcut — correct because the app genuinely has no non-exempt crypto.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"

  PotillusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PotillusTests
    dependencies:
      - target: Potillus
      - package: PotillusKit
        product: PotillusKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.godisch.potillus.tests
        GENERATE_INFOPLIST_FILE: "YES"

  # The UI-test target that fastlane snapshot drives to capture the App Store
  # screenshots. `TEST_TARGET_NAME` makes it a UI test of the app, so the runner
  # launches Potillus in the simulator.
  PotillusUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      # The test sources. SnapshotHelper.swift is fastlane's, materialized here by
      # `make screenshots-ios` from the installed fastlane and git-ignored (never
      # vendored, so it always matches the local fastlane version); this glob picks
      # it up once it is present.
      - path: PotillusUITests
      # The demo fixture the screenshot run seeds the store from — shared with the
      # Android screengrab flow. It rides into the UI-test bundle so the test can
      # hand it to the app in SCREENSHOT_FIXTURE_JSON.
      - path: ../fastlane/demo-backup.json
        type: file
        buildPhase: resources
    dependencies:
      - target: Potillus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.godisch.potillus.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: Potillus

# An explicit scheme is needed so the test action knows about the test target;
# without it, `Cmd+U` and `xcodebuild test` fail with "not configured for the
# test action".
schemes:
  Potillus:
    build:
      targets:
        Potillus: all
        PotillusTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PotillusTests

  # The scheme fastlane snapshot builds (see fastlane/Snapfile). It hosts the
  # UI-test target that drives the screenshots.
  PotillusUITests:
    build:
      targets:
        Potillus: all
        PotillusUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PotillusUITests
